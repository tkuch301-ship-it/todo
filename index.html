<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>タスク管理ツール</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main class="app">
    <header class="app-header">
      <h1>📋 タスク管理</h1>
      <p class="stats" id="stats"></p>
    </header>

    <section class="momentum" aria-label="継続状況">
      <div class="m-block m-streak">
        <span class="m-label">連続記録</span>
        <div class="streak-row">
          <span class="streak-flame">🔥</span>
          <strong id="streak-count">0日</strong>
        </div>
        <span class="m-note" id="streak-note"></span>
      </div>
      <div class="m-block">
        <span class="m-label"><strong id="level-label">Lv.1</strong> <span id="level-title"></span></span>
        <div class="bar"><div id="xp-fill"></div></div>
        <span class="m-note">タスク完了でXPゲット</span>
      </div>
      <div class="m-block">
        <span class="m-label">今日の目標 <strong id="goal-count">0 / 3件</strong></span>
        <div class="bar bar-goal"><div id="goal-fill"></div></div>
        <span class="m-note">まず1件、小さく始めよう</span>
      </div>
      <div class="m-block m-week">
        <span class="m-label">直近7日</span>
        <div class="week-dots" id="week-dots"></div>
      </div>
    </section>

    <form id="task-form" class="task-form" autocomplete="off">
      <input type="text" id="task-title" placeholder="新しいタスクを入力..." required maxlength="200">
      <div class="form-options">
        <label>
          期限
          <input type="date" id="task-due">
        </label>
        <label>
          優先度
          <select id="task-priority">
            <option value="low">低</option>
            <option value="medium" selected>中</option>
            <option value="high">高</option>
          </select>
        </label>
        <label class="repeat-label">
          <input type="checkbox" id="task-repeat">
          🔁 毎日繰り返す
        </label>
        <button type="submit" class="btn-primary">追加</button>
      </div>
    </form>

    <div class="toolbar">
      <input type="search" id="search" placeholder="タスクを検索...">
      <div class="filters" id="filters" role="tablist">
        <button data-filter="all" class="active">すべて</button>
        <button data-filter="active">未完了</button>
        <button data-filter="completed">完了</button>
      </div>
      <select id="sort">
        <option value="created">作成順</option>
        <option value="due">期限順</option>
        <option value="priority">優先度順</option>
      </select>
    </div>

    <ul id="task-list" class="task-list"></ul>

    <p id="empty-message" class="empty-message" hidden>タスクはありません。まずは「5分で終わる小さな一歩」を1つだけ追加してみよう</p>

    <footer class="app-footer">
      <button id="clear-completed" class="btn-text">完了済みを削除</button>
    </footer>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
