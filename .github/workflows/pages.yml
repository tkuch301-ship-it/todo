name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Pagesの公開ソースは gh-pages ブランチ。mainの内容をミラーして更新する
      - name: Sync main to gh-pages
        run: git push --force origin HEAD:gh-pages
